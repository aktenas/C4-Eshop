{% extends 'base.html' %}
{% block title %}Edit Piercing Properties{% endblock %}

{% block content %}
<main class="container my-5 py-4">
    <div class="col-md-8 mx-auto p-4 review-panel-container" style="border-left: 4px solid #FF0000;">
        <label class="text-red-label mb-3">// EDIT DATA MODEL ELEMENT</label>
        <h2 class="text-center mb-4 text-uppercase" style="font-family: 'Impact', sans-serif;">Modify Properties</h2>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="mb-3">
                <label class="small text-muted mb-1" style="font-family: monospace;">PIERCING STYLE NAME</label>
                <input type="text" name="title" class="form-control studio-input" value="{{ item.title }}" required>
            </div>

            <div class="mb-3">
                <label class="small text-muted mb-1" style="font-family: monospace;">PROCEDURE + JEWELRY COST ($)</label>
                <input type="number" step="0.01" name="price" class="form-control studio-input" value="{{ item.price }}" required>
            </div>

            <div class="mb-3">
                <label class="small text-muted mb-1" style="font-family: monospace;">JEWELRY MATERIAL (e.g., Titanium, Surgical Steel)</label>
                <input type="text" name="material" class="form-control studio-input" value="{{ item.material }}">
            </div>

            <div class="mb-4">
                <label class="small text-muted mb-1" style="font-family: monospace;">COLOR OPTION</label>
                <input type="text" name="color" class="form-control studio-input" value="{{ item.color }}">
            </div>

            <div class="red-accent-line my-4"></div>
            
            <div class="d-flex gap-2">
                <a href="{% url 'catalog:admin_piercing_dashboard' %}" class="btn btn-secondary w-50" style="border-radius: 0;">Cancel</a>
                <button type="submit" class="btn-red w-50 m-0">Save Properties</button>
            </div>
        </form>
    </div>
</main>
{% endblock %}
