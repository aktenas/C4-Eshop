{% extends 'base.html' %}
{% load static %}

{% block title %}C4 TATTOO - Modify Properties{% endblock %}

{% block content %}
<main class="container-fluid my-5 py-4">
    <div class="page-shell d-flex justify-content-center">
        
        <!-- Main Form Wrapper Container using strict stylesheet formatting -->
        <div class="p-5 review-panel-container w-100" style="max-width: 650px;">
            <span class="text-red-label text-start d-block mb-2">// EDIT DATA</span>

            <h1 class="page-title m-0 mb-4" style="font-size: 2.8rem !important; text-shadow: none !important;">MODIFY PROPERTIES</h1>
            
            <form method="POST" class="mt-4">
                {% csrf_token %}
                
                <!-- PIERCING STYLE NAME -->
                <div class="mb-4 text-start">
                    <label class="text-red-label text-start mb-2" style="font-size: 0.85rem;">// PIERCING NAME</label>
                    <input type="text" name="title" value="{{ item.title }}" class="studio-input w-100" required>
                </div>
                
                <!-- PROCEDURE + JEWELRY COST -->
                <div class="mb-4 text-start">
                    <label class="text-red-label text-start mb-2" style="font-size: 0.85rem;">// PROCEDURE + JEWELRY COST ($)</label>
                    <input type="number" name="price" step="0.01" value="{{ item.price }}" class="studio-select w-100" required>
                </div>
                
                <!-- JEWELRY MATERIAL -->
                <div class="mb-4 text-start">
                    <label class="text-red-label text-start mb-2" style="font-size: 0.85rem;">// JEWELRY MATERIAL (e.g., Titanium, Surgical Steel)</label>
                    <input type="text" name="material" value="{{ item.material|default:'' }}" class="studio-input w-100">
                </div>
                
                <!-- COLOR OPTION -->
                <div class="mb-4 text-start">
                    <label class="text-red-label text-start mb-2" style="font-size: 0.85rem;">// COLOR OPTION</label>
                    <input type="text" name="color" value="{{ item.color|default:'' }}" class="studio-input w-100">
                </div>
                
                <div class="red-accent-line my-4" style="border-bottom-width: 1px !important;"></div>
                
                <!-- ACTIONS ROW -->
                <div class="d-flex flex-column flex-sm-row gap-3 align-items-stretch align-items-sm-center mt-4">
                    <a href="{% url 'catalog:admin_piercing_dashboard' %}" class="text-decoration-none text-uppercase fw-bold text-muted small px-4 py-3 text-center order-2 order-sm-1" style="font-family: monospace; letter-spacing: 0.05em; border: 1px solid rgba(128,128,128,0.3); background: transparent; min-width: 120px;">
                        [ Cancel ]
                    </a>
                    <button type="submit" class="btn-red text-uppercase fw-bold m-0 flex-grow-1 order-1 order-sm-2" style="font-size: 1rem; padding: 12px 24px !important; width: auto !important; display: block !important;">
                        Save
                    </button>
                </div>

            </form>
        </div>

    </div>
</main>
{% endblock %}
